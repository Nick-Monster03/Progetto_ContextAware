<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Context-Aware Campus - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        #map { height: 400px; border-radius: 0.5rem; z-index: 1; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <nav class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold"> Dashboard Context-Aware</h1>
            <div>
                <button onclick="toggleHeatmap()" class="bg-blue-800 hover:bg-blue-700 px-4 py-2 rounded shadow">
                    Attiva/Disattiva Heatmap
                </button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
            <div class="col-span-1 lg:col-span-2 bg-white p-4 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Mappa Punti di Interesse</h2>
                <div id="map"></div>
            </div>

            <div class="bg-white p-4 rounded-lg shadow flex flex-col items-center">
                <h2 class="text-xl font-semibold mb-4">Bilancio dei Feedback</h2>
                <div class="w-full flex-grow flex justify-center items-center">
                    <canvas id="feedbackChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bg-white p-4 rounded-lg shadow mb-8">
            <h2 class="text-xl font-semibold mb-4">POI con più interazioni</h2>
            <canvas id="poiChart" height="80"></canvas>
        </div>

        <div class="bg-white p-4 rounded-lg shadow">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Elenco Punti di Interesse</h2>
            </div>
            
            <div class="overflow-x-auto max-h-96">
                <table class="min-w-full bg-white border relative">
                    <thead class="sticky top-0 bg-gray-200">
                        <tr class="text-left">
                            <th class="py-2 px-4 border-b">ID</th>
                            <th class="py-2 px-4 border-b">Nome</th>
                            <th class="py-2 px-4 border-b">Campus</th>
                            <th class="py-2 px-4 border-b">Descrizione</th>
                        </tr>
                    </thead>
                    <tbody id="poi-table-body">
                        <tr><td colspan="4" class="py-4 text-center text-gray-500">Caricamento dati...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="app.js"></script>
</body>
</html>
